
<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Forge Inventory Management</title>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<style>
 body {
 margin: 0;
 font-family: 'Inter', sans-serif;
 background: #0d0d0d;
 color: white;
 }
 
 header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 1rem 2rem;
 background: rgba(189, 131, 24, 0.1);
 backdrop-filter: blur(40px);
 border: 1px solid rgb(255, 157, 0);
 box-shadow: 0 4px 20px rgba(255, 140, 0, 0.5);
 position: sticky;
 top: 0;
 z-index: 10;
 }
 
 .header-left {
 display: flex;
 align-items: center;
 }
 
 .logo {
 height: 40px;
 margin-right: 10px;
 }
 
 .title {
 font-size: 1.8rem;
 font-weight: 600;
 background: linear-gradient(90deg, #ff6a00, #ffcc00);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 text-shadow: 0 0 8px rgba(236, 150, 65, 0.3);
 }
 
 .menu-btn {
 background: transparent;
 color: #ff6a00;
 border: 1px solid #ff6a00;
 padding: 0.4rem 1rem;
 border-radius: 6px;
 font-weight: 600;
 cursor: pointer;
 transition: background 0.3s;
 }
 
 .menu-btn:hover {
 background: #ff6a00;
 color: #000;
 }
 
 .main-content {
 text-align: center;
 padding: 6rem 2rem 2rem;
 }
 
 .main-content h1 {
 font-size: 2.5rem;
 margin-bottom: 2rem;
 }
 
 .rfid-loader {
 position: relative;
 width: 80px;
 height: 80px;
 margin: 0 auto 2rem;
 }
 
 .wave {
 position: absolute;
 width: 100%;
 height: 100%;
 border: 3px solid #ff6a00;
 border-radius: 50%;
 opacity: 0.5;
 animation: pulse 2s infinite ease-out;
 }
 
 .wave1 {
 animation-delay: 0s;
 }
 
 .wave2 {
 animation-delay: 0.5s;
 }
 
 .wave3 {
 animation-delay: 1s;
 }
 
 @keyframes pulse {
 0% {
 transform: scale(0.7);
 opacity: 0.6;
 }
 100% {
 transform: scale(2);
 opacity: 0;
 }
 }
 
 .no-rfid {
 margin-top: 4rem;
 }
 
 .no-rfid button {
 background: #ff6a00;
 color: #fff;
 border: none;
 padding: 0.8rem 2rem;
 font-size: 1.1rem;
 border-radius: 10px;
 cursor: pointer;
 box-shadow: 0 4px 12px rgba(255, 106, 0, 0.4);
 transition: transform 0.2s ease;
 }
 
 .no-rfid button:hover {
 transform: scale(1.05);
 background: #ffaa00;
 }
 
 .component-grid {
 display: none;
 padding: 2rem;
 animation: fadeIn 0.5s ease-in-out;
 }
 
 .component-grid h2 {
 text-align: center;
 color: #ff6a00;
 margin-bottom: 1.5rem;
 }
 
 .grid {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 gap: 1rem;
 }
 
 .grid-item {
 background: rgba(255, 255, 255, 0.05);
 border: 1px solid #ff6a00;
 border-radius: 10px;
 padding: 1rem;
 text-align: center;
 font-size: 1rem;
 color: white;
 backdrop-filter: blur(6px);
 transition: transform 0.3s;
 }
 
 .grid-item:hover {
 transform: translateY(-5px);
 background-color: #ff6a00;
 color: black;
 }
 
 @keyframes fadeIn {
 from {
 opacity: 0;
 }
 to {
 opacity: 1;
 }
 }
</style>

<body>
 <header>
 <div class="header-left">
 <img src="{{url_for('static',filename='images/forge logo copy.png')}}" alt="Logo" class="logo">
 <div class="title">INNOVENTORY</div>
 </div>
 <div class="header-right">
 <button class="menu-btn" onclick="toggleMenu()">Menu</button>
 </div>
 </header>

 <div class="main-content" id="scanScreen">
 <h1>Scan Your ID Here...</h1>

 <div class="rfid-loader">
 <div class="wave wave1"></div>
 <div class="wave wave2"></div>
 <div class="wave wave3"></div>
 </div>
 <div class="no-rfid">
 <button onclick="window.location.href='/camera'"> No RFID? Take Photo Instead</button>
 </div>
 </div>

 <div class="component-grid" id="componentGrid">
 <h2>Inventory Components</h2>
 <div class="grid" id="gridItems"></div>
 </div>

 <script>
 const components = [
 "Servo Motor", "DC Motor", "IR Sensor", "Ultrasonic Sensor", "LED",
 "Breadboard", "Resistor", "Capacitor", "Arduino UNO", "ESP32",
 "Jumper Wires", "Buzzer", "LCD Display", "Relay Module", "L293D Module"
 ];

 function toggleMenu() {
 const scanScreen = document.getElementById("scanScreen");
 const componentGrid = document.getElementById("componentGrid");

 if (componentGrid.style.display === "none" || componentGrid.style.display === "") {
 scanScreen.style.display = "none";
 componentGrid.style.display = "block";
 renderComponents();
 } else {
 componentGrid.style.display = "none";
 scanScreen.style.display = "block";
 }
 }

 function renderComponents() {
 const grid = document.getElementById("gridItems");
 grid.innerHTML = components.map(item => `<div class="grid-item">${item}</div>`).join('');
 }

 function pollRFID() {
 $.get('/last_rfid', data => {
 if (data.rfid && data.username && data.username !== "Unknown") {
 window.location.href = `/inventory?username=${encodeURIComponent(data.username)}&rfid=${encodeURIComponent(data.rfid)}`;
 } else if (data.username === "Unknown") {
 $('#scanScreen').find('.rfid-error').remove();
 $('#scanScreen').append('<div class="rfid-error" style="color:#ff3333; margin-top:1rem;">Invalid Card. Access Denied.</div>');
 }
 });
 }

 setInterval(pollRFID, 1000);
 </script>
</body>

</html>
